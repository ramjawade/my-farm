<aside class="app-sidebar" [class.open]="open()">
  <nav class="nav nav-pills flex-column p-3 gap-1">
    <a
      class="nav-link"
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{exact: true}"
      (click)="onNavClick()"
    >
      <i class="bi bi-house-door-fill me-2"></i>Home
    </a>
    <a
      class="nav-link"
      routerLink="/crops"
      routerLinkActive="active"
      (click)="onNavClick()"
    >
      <i class="bi bi-grid-3x3-gap-fill me-2"></i>Crops & Fields
    </a>
    <a
      class="nav-link"
      routerLink="/activities"
      routerLinkActive="active"
      (click)="onNavClick()"
    >
      <i class="bi bi-activity me-2"></i>Activities
    </a>
    <a
      class="nav-link"
      routerLink="/map"
      routerLinkActive="active"
      (click)="onNavClick()"
    >
      <i class="bi bi-map me-2"></i>Lands
    </a>
    <a
      class="nav-link"
      routerLink="/weather"
      routerLinkActive="active"
      (click)="onNavClick()"
    >
      <i class="bi bi-cloud-sun me-2"></i>Weather
    </a>
    <a
      class="nav-link"
      routerLink="/register"
      routerLinkActive="active"
      (click)="onNavClick()"
    >
      <i class="bi bi-person-plus-fill me-2"></i>Register Farmer
    </a>
  </nav>
</aside>
