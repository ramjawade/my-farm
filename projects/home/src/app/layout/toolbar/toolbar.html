<header class="app-toolbar">
  <nav class="navbar navbar-light bg-light border-bottom px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center p-0">
      
      <!-- Left side: Toggle button (for mobile) and Brand Name -->
      <div class="d-flex align-items-center">
        <button
          type="button"
          class="btn btn-outline-secondary d-md-none me-2"
          aria-label="Toggle navigation menu"
          [attr.aria-expanded]="menuExpanded()"
          (click)="onMenuClick()"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <span class="navbar-brand mb-0 fw-bold text-success d-flex align-items-center gap-2">
          <i class="bi bi-tree-fill text-success"></i>
          <span>My Farm</span>
        </span>
      </div>

      <!-- Right side: Language Dropdown and User Avatar -->
      <div class="d-flex align-items-center gap-3">
        
        <!-- Language Dropdown -->
        <div class="position-relative">
          <button 
            type="button"
            class="btn btn-sm bg-white border border-light-subtle rounded-pill px-3 py-1 text-xs fw-semibold text-secondary d-flex align-items-center gap-1.5 hover-lift shadow-xs"
            style="height: 32px;"
            (click)="toggleLangDropdown(); $event.stopPropagation();"
          >
            <i class="bi bi-translate text-success"></i>
            <span>{{ activeLangName() }}</span>
            <i class="bi bi-chevron-down text-xs transition ms-1" [style.transform]="langDropdownOpen() ? 'rotate(180deg)' : 'rotate(0)'"></i>
          </button>
          
          @if (langDropdownOpen()) {
            <div 
              class="position-absolute end-0 mt-2 bg-white rounded-3 shadow-lg border border-light-subtle py-1 overflow-hidden animate-fade-in"
              style="min-width: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.08) !important;"
            >
              @for (lang of languages; track lang.code) {
                <button 
                  type="button" 
                  class="dropdown-item w-100 text-start px-3 py-2 fw-semibold text-xs border-0 bg-transparent transition hover-bg-light"
                  [class.text-success]="activeLang() === lang.code"
                  [class.bg-success-subtle]="activeLang() === lang.code"
                  (click)="selectLang(lang.code); $event.stopPropagation();"
                >
                  {{ lang.name }}
                </button>
              }
            </div>
          }
        </div>

        <!-- User Avatar Dropdown -->
        <div class="position-relative">
          <button 
            type="button"
            class="btn p-0 border-0 bg-transparent rounded-circle overflow-hidden shadow-sm hover-lift d-flex align-items-center justify-content-center"
            style="width: 36px; height: 36px;"
            (click)="toggleUserDropdown(); $event.stopPropagation();"
          >
            <img 
              src="avatar.png" 
              alt="User Avatar" 
              style="width: 100%; height: 100%; object-fit: cover;"
              (error)="fallbackAvatar($event)"
            />
          </button>
          
          @if (userDropdownOpen()) {
            <div 
              class="position-absolute end-0 mt-2 bg-white rounded-3 shadow-lg border border-light-subtle py-2 overflow-hidden animate-fade-in"
              style="min-width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.08) !important;"
            >
              <!-- User Info header inside dropdown -->
              <div class="px-3 pb-2 mb-2 border-bottom">
                <div class="fw-bold text-dark text-sm">Ram Jawade</div>
                <div class="text-xs text-muted">Farmer / Admin</div>
              </div>
              
              <button 
                type="button" 
                class="dropdown-item w-100 text-start px-3 py-2 fw-semibold text-xs border-0 bg-transparent transition hover-bg-light d-flex align-items-center gap-2"
              >
                <i class="bi bi-person-fill text-success"></i>
                <span>My Profile</span>
              </button>
              <button 
                type="button" 
                class="dropdown-item w-100 text-start px-3 py-2 fw-semibold text-xs border-0 bg-transparent transition hover-bg-light d-flex align-items-center gap-2"
              >
                <i class="bi bi-gear-fill text-success"></i>
                <span>Settings</span>
              </button>
              <div class="border-top my-1"></div>
              <button 
                type="button" 
                class="dropdown-item w-100 text-start px-3 py-2 fw-semibold text-xs border-0 bg-transparent text-danger transition hover-bg-light d-flex align-items-center gap-2"
              >
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
              </button>
            </div>
          }
        </div>

      </div>

    </div>
  </nav>
</header>
