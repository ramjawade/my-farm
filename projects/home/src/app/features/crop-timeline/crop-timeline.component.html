<div class="crop-timeline-container py-4 px-3 px-md-5">
  <router-outlet></router-outlet>
</div>

<!-- Confirm Delete Crop Activity Dialog -->
<lib-confirm-dialog
  [title]="'Delete Activity Record'"
  [message]="'Are you sure you want to delete this activity record?'"
  [confirmText]="'Delete'"
  [cancelText]="'Cancel'"
  [isDestructive]="true"
  [(isOpen)]="showDeleteConfirm"
  (confirm)="confirmDeleteActivity()"
></lib-confirm-dialog>

<!-- Confirm Delete Crop Profile Dialog -->
<lib-confirm-dialog
  [title]="'Delete Crop Profile'"
  [message]="'Are you sure you want to delete this crop profile and all its associated activities? This action cannot be undone.'"
  [confirmText]="'Delete'"
  [cancelText]="'Cancel'"
  [isDestructive]="true"
  [(isOpen)]="showDeleteCropConfirm"
  (confirm)="confirmDeleteCrop()"
></lib-confirm-dialog>
